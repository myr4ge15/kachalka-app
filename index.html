<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy (defense-in-depth на статике GitHub Pages, где
      HTTP-заголовки задать нельзя). 'unsafe-inline' для style — из-за inline-
      стилей recharts/SVG; скрипты — только со своего origin. connect-src открыт
      на Supabase: если используете СВОЙ домен Supabase, добавьте его сюда.
      img-src: blob: — для object-URL при выборе аватара (иначе декод файла через
      <img> рубится CSP → «Не удалось прочитать изображение» на ЛЮБОМ фото);
      https://*.supabase.co — чтобы показывать загруженный аватар из Storage.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <!-- user-scalable=no + maximum-scale=1: PWA-приложение, а не страница — двойной
         тап/пинч-зум только ломают вёрстку и мешают быстрым тапам в зале. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a1a" />
    <!-- standalone-режим PWA: mobile-web-app-capable (стандарт) + apple-* (iOS Safari
         его до сих пор требует, иначе приложение открывается в обычной вкладке). -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="kachalka-app" />
    <title>Журнал тренировок</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
